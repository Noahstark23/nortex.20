version: '3.8'
services:
  db:
    image: 'mysql:8.0'
    command: '--default-authentication-plugin=mysql_native_password'
    restart: always
    environment:
      # Sin default inseguro: compose falla si DB_ROOT_PASSWORD no está definido.
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Define DB_ROOT_PASSWORD (sin default inseguro)}
      MYSQL_DATABASE: nortex_db
    # SIN `ports`: la base de datos NO se publica al host/internet. El servicio
    # `app` la alcanza por la red interna de compose (db:3306). Antes 3306 estaba
    # expuesto al mundo — brecha crítica.
    volumes:
      - 'mysql_data:/var/lib/mysql'
    # Healthcheck: `app` espera a que MySQL esté LISTO (no solo que el contenedor
    # exista) vía `depends_on: condition: service_healthy`. Elimina el race de
    # primer arranque que tumbaba la app en bucle. start_period cubre el init
    # inicial de MySQL 8 (crea el datadir la primera vez).
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${DB_ROOT_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # phpMyAdmin solo bajo demanda (perfil "debug"); NO se levanta en producción.
  # Uso puntual:  docker compose --profile debug up phpmyadmin
  # Además, su puerto se publica solo en localhost (usar túnel SSH para acceder).
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    profiles: ["debug"]
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Define DB_ROOT_PASSWORD}
    ports:
      - '127.0.0.1:8081:80'
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mysql://root:${DB_ROOT_PASSWORD:?Define DB_ROOT_PASSWORD}@db:3306/nortex_db
    # Espera a que MySQL pase el healthcheck antes de arrancar (belt-and-suspenders
    # junto al wait del entrypoint, por si Coolify no honra la condición).
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
